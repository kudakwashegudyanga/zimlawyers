services:
  # Backend API Service
  type: web
  name: zimlayers-backend
  env: node
  plan: free
  buildCommand: npm install
  startCommand: node server.js
  envVars:
    - key: NODE_ENV
      value: production
    - key: MONGODB_URI
      sync: false
    - key: JWT_SECRET
      sync: false
    - key: EMAIL_HOST
      sync: false
    - key: EMAIL_PORT
      sync: false
    - key: EMAIL_USER
      sync: false
    - key: EMAIL_PASS
      sync: false

